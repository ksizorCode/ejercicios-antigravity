<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simpsonpedia - Guía de Personajes</title>
    
    <!-- Meta SEO & PWA -->
    <meta name="description" content="La guía definitiva de personajes de Los Simpson">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD90F">

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Estilos Externos -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="p-4 md:p-8">

    <!-- Header -->
    <header class="text-center mb-8">
        <h1 class="simpson-font text-6xl md:text-8xl text-yellow-400 drop-shadow-[4px_4px_0px_rgba(0,0,0,1)] italic">
            Simpsonpedia
        </h1>
        <p class="text-xl mt-4 font-bold text-gray-700 bg-white inline-block px-4 py-1 border-2 border-black">
            La "Pokedex" de Springfield
        </p>
    </header>

    <!-- Buscador y Controles -->
    <div class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row gap-4 justify-between items-center">
        <div class="relative w-full md:w-96">
            <input type="text" id="search-input" placeholder="Buscar personaje..."
                class="w-full p-3 pl-10 border-4 border-black font-bold focus:outline-none focus:ring-4 focus:ring-blue-400">
            <span class="absolute left-3 top-3">🔍</span>
        </div>
        <div class="flex gap-4">
            <button id="refresh-btn" class="btn-blue px-4 py-2 font-bold hover:bg-blue-500 transition-colors">
                Cargar Nuevos
            </button>
        </div>
    </div>

    <!-- Contenedor Principal -->
    <main class="max-w-6xl mx-auto">
        <!-- Estado de Carga -->
        <div id="loading" class="flex flex-col items-center justify-center py-20 hidden">
            <div class="loader mb-4"></div>
            <p class="simpson-font text-2xl">Buscando en la Planta Nuclear...</p>
        </div>

        <!-- Grid -->
        <div id="character-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- Los personajes se inyectarán aquí -->
        </div>

        <!-- Paginación -->
        <div id="pagination-container" class="flex justify-center items-center gap-6 mt-12 mb-20 hidden">
            <button id="prev-btn" class="btn-blue px-6 py-2 simpson-font text-xl disabled:opacity-50 disabled:cursor-not-allowed">
                Anterior
            </button>
            <span id="page-info" class="font-bold text-lg bg-white px-4 py-2 border-2 border-black">Página 1</span>
            <button id="next-btn" class="btn-blue px-6 py-2 simpson-font text-xl">
                Siguiente
            </button>
        </div>
    </main>

    <!-- Modal de Detalle -->
    <div id="modal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white border-4 border-black max-w-2xl w-full relative overflow-hidden flex flex-col md:flex-row shadow-[20px_20px_0px_rgba(0,0,0,0.5)]">
            <button id="close-modal" class="absolute top-2 right-2 bg-red-500 text-white w-10 h-10 border-2 border-black font-bold text-xl flex items-center justify-center z-10 hover:bg-red-700">
                X
            </button>

            <div class="w-full md:w-1/2 bg-yellow-400 p-8 flex items-center justify-center border-b-4 md:border-b-0 md:border-r-4 border-black min-h-[300px]">
                <img id="modal-img" src="" alt="" class="max-h-80 object-contain drop-shadow-[10px_10px_0px_rgba(0,0,0,0.2)]">
            </div>

            <div class="w-full md:w-1/2 p-8 bg-white flex flex-col justify-center">
                <h2 id="modal-name" class="simpson-font text-5xl mb-4 text-blue-600 uppercase">Nombre</h2>
                <div class="space-y-4 text-gray-800">
                    <div>
                        <h3 class="font-bold uppercase text-xs text-gray-400">Cita Célebre</h3>
                        <p id="modal-quote" class="italic text-xl text-gray-700 leading-tight">"..."</p>
                    </div>
                    <div class="pt-6">
                        <button id="speak-btn" class="w-full btn-blue py-3 flex items-center justify-center gap-2 hover:bg-blue-500">
                            <span class="text-2xl">🔊</span>
                            <span class="font-bold uppercase tracking-wider">Escuchar Frase</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de la App -->
    <script src="assets/js/app.js"></script>
    
    <!-- Registro de Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado ✨', reg))
                    .catch(err => console.log('Error SW ❌', err));
            });
        }
    </script>
</body>

</html>
