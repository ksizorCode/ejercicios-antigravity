<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Ejercicios | Antigravity 🚀</title>
    
    <!-- Meta etiquetas SEO -->
    <meta name="description" content="Centro de mando de los ejercicios de desarrollo web de Antigravity.">
    <link rel="icon" href="https://fav.farm/🚀">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* =============================================
           🎨 ESTILOS GLOBALES
        ============================================= */
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🔮 Orbes flotantes de fondo (vista Hub) */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to   { transform: translate(10%, 10%); }
        }

        /* 💎 Tarjeta glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* 🏷️ Etiquetas / tags */
        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* =============================================
           📱 BOTÓN TOGGLE VISTA
        ============================================= */
        #btn-toggle-view {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(139, 92, 246, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.5);
            color: #c4b5fd;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        }

        #btn-toggle-view:hover {
            background: rgba(139, 92, 246, 0.5);
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(139,92,246,0.5);
        }

        /* =============================================
           📱 VISTA ESCRITORIO ANDROID
        ============================================= */
        #android-view {
            display: none;         /* Se activa con JS */
            position: fixed;
            inset: 0;
            z-index: 500;
            overflow: hidden;
        }

        /* 🖼️ Fondo aleatorio de picsum.photos */
        #android-wallpaper {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 0.5s ease;
        }

        /* Capa oscura sobre el fondo */
        #android-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0.35) 0%,
                rgba(0,0,0,0.20) 40%,
                rgba(0,0,0,0.55) 100%
            );
        }

        /* 📶 Barra de estado superior (como Android) */
        #android-statusbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            z-index: 10;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
        }

        /* 📱 Grid de iconos del escritorio */
        #android-grid {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 90px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px 8px;
            padding: 20px 16px;
            overflow-y: auto;
            align-content: start;
            z-index: 10;
        }

        /* 📦 Cada icono de app */
        .android-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: transform 0.15s ease;
        }

        .android-icon:hover,
        .android-icon:active {
            transform: scale(0.92);
        }

        /* 🟣 Fondo del icono con efecto glassmorphism fuerte */
        .android-icon-bg {
            width: 62px;
            height: 62px;
            border-radius: 18px;
            /* 💎 Capa semitransparente sobre el wallpaper */
            background: rgba(255, 255, 255, 0.15);
            /* 🔮 Blur fuerte para desenfoque del fondo real */
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            /* ✨ Borde con brillo sutil */
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            /* 🌑 Sombra interior + exterior para profundidad */
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
        }

        .android-icon:hover .android-icon-bg {
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow:
                0 8px 28px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        /* 🏷️ Nombre de la app bajo el icono */
        .android-icon-label {
            font-size: 0.68rem;
            font-weight: 500;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            max-width: 70px;
            line-height: 1.2;
            word-break: break-word;
        }

        /* 📍 Barra inferior tipo dock Android */
        #android-dock {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 480px;         /* 👈 Más ancho para 5 iconos */
            height: 76px;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 38px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-around;   /* 👈 Distribuye equitativamente */
            padding: 0 12px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.45),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        /* 🔘 Botones del dock (estilo general) */
        .dock-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border: none;
            background: none;
            color: white;
            font-family: 'Outfit', sans-serif;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-decoration: none;
            padding: 0;
        }

        .dock-btn:hover {
            transform: translateY(-4px) scale(1.1);
        }

        .dock-btn:active {
            transform: scale(0.9);
        }

        /* 🟣 Icono circular del dock */
        .dock-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow:
                0 3px 12px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.25);
            transition: all 0.2s ease;
        }

        .dock-btn:hover .dock-icon {
            background: rgba(255,255,255,0.30);
            border-color: rgba(255,255,255,0.55);
        }

        /* 🔵 Icono Hub con acento especial (morado) */
        .dock-icon-hub {
            background: rgba(139, 92, 246, 0.35);
            border-color: rgba(139, 92, 246, 0.6);
            box-shadow:
                0 3px 16px rgba(139,92,246,0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .dock-btn:hover .dock-icon-hub {
            background: rgba(139, 92, 246, 0.55);
        }

        /* 🏷️ Etiqueta bajo icono del dock */
        .dock-label {
            font-size: 0.58rem;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            text-align: center;
        }

        /* ⏰ Separador vertical entre iconos del dock */
        .dock-divider {
            width: 1px;
            height: 36px;
            background: rgba(255,255,255,0.15);
            margin: 0 2px;
        }

        /* 🔄 Animación de entrada para el escritorio */
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .android-icon {
            animation: slideUp 0.4s ease both;
        }

        /* 🔄 Efecto de cambio de wallpaper */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .wallpaper-fade {
            animation: fadeIn 0.8s ease;
        }

    </style>
</head>
<body class="flex flex-col items-center py-12 px-4">

    <!-- =============================================
         🔮 Orbes de fondo (solo vista Hub)
    ============================================= -->
    <div class="orb w-[500px] h-[500px] bg-purple-600/20 top-[-100px] left-[-100px]"></div>
    <div class="orb w-[400px] h-[400px] bg-blue-600/20 bottom-[-50px] right-[-50px]" style="animation-delay: -5s;"></div>

    <!-- =============================================
         📱 BOTÓN TOGGLE - Cambia entre vistas
    ============================================= -->
    <button id="btn-toggle-view" onclick="toggleView()" title="Cambiar vista">
        <span id="toggle-icon">📱</span>
        <span id="toggle-label">Vista Móvil</span>
    </button>

    <!-- =============================================
         🖥️ VISTA HUB (por defecto)
    ============================================= -->
    <main id="hub-view" class="w-full max-w-6xl">
        
        <!-- Cabecera -->
        <header class="text-center mb-16 space-y-4">
            <h1 class="text-5xl md:text-7xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-blue-400 leading-tight">
                Hub de Ejercicios
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-light max-w-2xl mx-auto">
                Explora el ecosistema de aplicaciones creadas por <span class="text-purple-400 font-semibold">Antigravity</span>. Tecnología, diseño y funcionalidad en un solo lugar.
            </p>
        </header>

        <!-- Contenedor Grid -->
        <div id="exercise-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cargando... -->
            <div class="col-span-full text-center py-20 opacity-50 italic">
                Cargando proyectos desde el hiperespacio... 🛸
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-20 text-slate-500 text-sm font-light">
        © 2026 Antigravity Development Studio • ✨ Powered by Tailwind
    </footer>

    <!-- =============================================
         📱 VISTA ESCRITORIO ANDROID
    ============================================= -->
    <div id="android-view">

        <!-- 🖼️ Fondo (wallpaper) desde picsum.photos -->
        <div id="android-wallpaper"></div>

        <!-- 🌑 Capa oscura semitransparente -->
        <div id="android-overlay"></div>

        <!-- 📶 Barra de estado superior -->
        <div id="android-statusbar">
            <span id="android-time">--:--</span>
            <span>Antigravity OS ✨</span>
            <span>
                <i class="fas fa-wifi mr-1"></i>
                <i class="fas fa-battery-three-quarters"></i>
            </span>
        </div>

        <!-- 📱 Grid de iconos -->
        <div id="android-grid">
            <!-- Los iconos se generan dinámicamente con JS -->
        </div>

        <!-- ⏩ Dock inferior con 5 accesos rápidos -->
        <div id="android-dock">

            <!-- 🏠 Botón VISTA HUB (antes era el toggle flotante) -->
            <button class="dock-btn" onclick="toggleView()" title="Volver al Hub">
                <div class="dock-icon dock-icon-hub">🚀</div>
                <span class="dock-label">Hub</span>
            </button>

            <!-- Separador -->
            <div class="dock-divider"></div>

            <!-- 📷 Icono Cámara (decorativo) -->
            <a class="dock-btn" href="#" onclick="return false;" title="Cámara">
                <div class="dock-icon">📷</div>
                <span class="dock-label">Cámara</span>
            </a>

            <!-- 🎵 Icono Música (decorativo) -->
            <a class="dock-btn" href="#" onclick="return false;" title="Música">
                <div class="dock-icon">🎵</div>
                <span class="dock-label">Música</span>
            </a>

            <!-- 🌐 Icono Navegador (decorativo) -->
            <a class="dock-btn" href="#" onclick="return false;" title="Navegador">
                <div class="dock-icon">🌐</div>
                <span class="dock-label">Web</span>
            </a>

            <!-- Separador -->
            <div class="dock-divider"></div>

            <!-- 🔄 Botón cambiar wallpaper -->
            <button class="dock-btn" onclick="refreshWallpaper()" title="Nuevo fondo">
                <div class="dock-icon">🖼️</div>
                <span class="dock-label">Fondo</span>
            </button>

        </div>

    </div>

    <!-- =============================================
         ⚙️ SCRIPTS
    ============================================= -->
    <script>
        // =============================================
        // 📦 Estado global de la aplicación
        // =============================================
        let exercises = [];       // Lista de proyectos del JSON
        let currentView = 'hub'; // Vista actual: 'hub' | 'android'

        // 🎲 Semilla aleatoria para picsum (cambia en cada wallpaper)
        let wallpaperSeed = Math.floor(Math.random() * 1000);

        // =============================================
        // 📡 CARGA DE DATOS desde listado.json
        // =============================================
        async function loadExercises() {
            try {
                const response = await fetch('listado.json');
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                exercises = await response.json();

                // Renderizamos ambas vistas con los datos cargados
                renderHubView();
                renderAndroidView();

            } catch (error) {
                console.error('❌ Error cargando listado.json:', error);
                document.getElementById('exercise-grid').innerHTML = `
                    <div class="col-span-full bg-red-500/10 border border-red-500/20 p-8 rounded-2xl text-center text-red-400">
                        <i class="fas fa-exclamation-triangle text-3xl mb-4"></i>
                        <p>¡Ups! No pudimos cargar los proyectos. 🛸</p>
                    </div>
                `;
            }
        }

        // =============================================
        // 🖥️ RENDERIZAR VISTA HUB (tarjetas)
        // =============================================
        function renderHubView() {
            const grid = document.getElementById('exercise-grid');
            grid.innerHTML = '';

            exercises.forEach((ex) => {
                // Construimos cada tarjeta de proyecto
                const card = `
                    <a href="${ex.ruta}" target="_self" class="glass-card rounded-3xl p-8 flex flex-col group cursor-pointer">
                        <!-- Emoji con efecto hover -->
                        <div class="text-5xl mb-6 transform group-hover:scale-125 transition-transform duration-300">
                            ${ex.emoji}
                        </div>
                        <!-- Título -->
                        <h3 class="text-2xl font-bold mb-3 text-white group-hover:text-purple-400 transition-colors">
                            ${ex.titulo}
                        </h3>
                        <!-- Descripción -->
                        <p class="text-slate-400 text-sm leading-relaxed mb-6 flex-grow">
                            ${ex.descripcion}
                        </p>
                        <!-- Tags -->
                        <div class="flex flex-wrap gap-2 mt-auto">
                            ${ex.tags.map(tag => `<span class="tag text-slate-300">${tag}</span>`).join('')}
                        </div>
                        <!-- Enlace visual -->
                        <div class="mt-6 pt-6 border-t border-white/5 flex items-center text-purple-400 text-sm font-semibold opacity-0 group-hover:opacity-100 transition-opacity">
                            Explorar Proyecto <i class="fas fa-arrow-right ml-2 text-xs"></i>
                        </div>
                    </a>
                `;
                grid.innerHTML += card;
            });
        }

        // =============================================
        // 📱 RENDERIZAR VISTA ANDROID (iconos)
        // =============================================
        function renderAndroidView() {
            const grid = document.getElementById('android-grid');
            grid.innerHTML = '';

            exercises.forEach((ex, index) => {
                // Calculamos el delay de animación escalonado
                const delay = index * 60;

                // Cada icono es un enlace que abre el proyecto
                const icon = `
                    <a href="${ex.ruta}"
                       target="_self"
                       class="android-icon"
                       style="animation-delay: ${delay}ms"
                       title="${ex.titulo}">
                        <!-- 🟣 Fondo redondeado del icono -->
                        <div class="android-icon-bg">
                            ${ex.emoji}
                        </div>
                        <!-- 🏷️ Nombre corto bajo el icono -->
                        <span class="android-icon-label">${ex.titulo}</span>
                    </a>
                `;
                grid.innerHTML += icon;
            });

            // Cargamos el wallpaper inicial
            setWallpaper(wallpaperSeed);
        }

        // =============================================
        // 🖼️ WALLPAPER: cargar imagen aleatoria de picsum
        // =============================================
        function setWallpaper(seed) {
            const wallpaper = document.getElementById('android-wallpaper');
            
            // Generamos dimensiones según la pantalla
            const w = window.innerWidth  || 800;
            const h = window.innerHeight || 1200;

            // URL de picsum con semilla fija para consistencia
            const url = `https://picsum.photos/seed/${seed}/${w}/${h}`;

            // Aplicamos el fondo con animación
            wallpaper.style.backgroundImage = `url('${url}')`;
            wallpaper.className = 'wallpaper-fade';

            // Reiniciamos la clase para poder re-animar
            setTimeout(() => wallpaper.className = '', 900);
        }

        // 🔄 Genera un nuevo wallpaper aleatorio
        function refreshWallpaper() {
            wallpaperSeed = Math.floor(Math.random() * 1000);
            setWallpaper(wallpaperSeed);
        }

        // =============================================
        // 🔀 TOGGLE: alterna entre vista Hub y Android
        // =============================================
        function toggleView() {
            const hubView      = document.getElementById('hub-view');
            const androidView  = document.getElementById('android-view');
            const footer       = document.querySelector('footer');
            const toggleBtn    = document.getElementById('btn-toggle-view'); // botón flotante
            const toggleIcon   = document.getElementById('toggle-icon');
            const toggleLabel  = document.getElementById('toggle-label');

            if (currentView === 'hub') {
                // 📱 Entramos en vista Android
                currentView = 'android';
                hubView.style.display      = 'none';
                footer.style.display       = 'none';
                androidView.style.display  = 'block';
                // 🙈 Ocultamos el botón flotante: el dock tiene el botón de Hub
                toggleBtn.style.display    = 'none';
                document.body.classList.remove('flex', 'flex-col', 'items-center', 'py-12', 'px-4');

            } else {
                // 🖥️ Volvemos al Hub
                currentView = 'hub';
                androidView.style.display  = 'none';
                hubView.style.display      = 'block';
                footer.style.display       = 'block';
                // 👁️ Volvemos a mostrar el botón flotante con estado Hub
                toggleBtn.style.display    = 'flex';
                toggleIcon.textContent     = '📱';
                toggleLabel.textContent    = 'Vista Móvil';
                document.body.classList.add('flex', 'flex-col', 'items-center', 'py-12', 'px-4');
            }
        }

        // =============================================
        // ⏰ RELOJ en tiempo real para el escritorio
        // =============================================
        function updateClock() {
            const now  = new Date();
            const h    = String(now.getHours()).padStart(2, '0');
            const m    = String(now.getMinutes()).padStart(2, '0');
            const time = `${h}:${m}`;

            // Actualizamos ambos elementos del reloj
            const clockStatus = document.getElementById('android-time');
            const clockDock   = document.getElementById('android-clock-dock');

            if (clockStatus) clockStatus.textContent = time;
            if (clockDock)   clockDock.textContent   = time;
        }

        // =============================================
        // 🎬 INICIALIZACIÓN al cargar la página
        // =============================================
        window.addEventListener('DOMContentLoaded', () => {
            loadExercises();   // Carga JSON y renderiza vistas
            updateClock();     // Hora inicial inmediata
            setInterval(updateClock, 30000); // Actualiza cada 30s
        });
    </script>

</body>
</html>
